name: Build and Deploy F-Droid Repo

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make gradlew executable
        run: chmod +x ./gradlew || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  fdroid:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: fdroid-temp/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y fdroidserver

      - name: Initialize and build F-Droid repo
        run: |
          mkdir -p fdroid
          cd fdroid
          
          # Initialize F-Droid repo (generates temporary keystore and config.yml)
          fdroid init
          
          # Set the canonical URL for the repository (used for QR codes and index metadata)
          echo 'repo_url: "https://organomagnesiumhalide.github.io/edstem/repo"' >> config.yml
          
          # Move downloaded APK to the repo folder
          mkdir -p repo
          mv ../fdroid-temp/app-debug.apk repo/
          
          # Update the repo metadata
          fdroid update --create-metadata

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fdroid/

  deploy:
    needs: fdroid
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
