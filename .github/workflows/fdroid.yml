name: Build and Deploy F-Droid Repo

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Make gradlew executable
        run: chmod +x ./gradlew || true

      - name: Decode App Keystore
        run: |
          echo "${{ secrets.APP_KEYSTORE_BASE64 }}" | base64 --decode > app/app-release.jks

      - name: Build Release APK
        env:
          KEYSTORE_FILE: "app-release.jks"
          KEYSTORE_PASSWORD: ${{ secrets.APP_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.APP_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.APP_KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

  fdroid:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release
          path: fdroid-temp/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y fdroidserver

      - name: Initialize and build F-Droid repo
        run: |
          mkdir -p fdroid
          cd fdroid
          
          # Initialize F-Droid repo
          fdroid init
          
          # Decode F-Droid Keystore
          echo "${{ secrets.FDROID_KEYSTORE_BASE64 }}" | base64 --decode > fdroid-repo.p12
          
          # Configure config.yml securely
          echo 'repo_url: "https://organomagnesiumhalide.github.io/edstem/repo/"' >> config.yml
          echo 'keystore: "fdroid-repo.p12"' >> config.yml
          echo 'repo_keyalias: "${{ secrets.FDROID_KEY_ALIAS }}"' >> config.yml
          echo 'keystorepass: "${{ secrets.FDROID_KEYSTORE_PASSWORD }}"' >> config.yml
          echo 'keypass: "${{ secrets.FDROID_KEYSTORE_PASSWORD }}"' >> config.yml
          
          # Move downloaded APK to the repo folder
          mkdir -p repo
          mv ../fdroid-temp/app-release.apk repo/
          
          # Update the repo metadata
          fdroid update --create-metadata

      - name: Prepare Pages Artifact Directory
        run: |
          # Only deploy the 'repo' directory to avoid exposing config.yml and keystore.p12
          mkdir -p public/repo
          mv fdroid/repo/* public/repo/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  deploy:
    needs: fdroid
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
